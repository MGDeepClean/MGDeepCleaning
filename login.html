<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MG Deep Clean</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="mg-style.css">
    <style>
        :root {
            --orange: #F07C1A;
            --charcoal: #1A1A1A;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at top left, #242424, #1A1A1A);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .btn-primary {
            background: var(--orange);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background: #ff9231;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(240, 124, 26, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: var(--orange);
            background: rgba(0, 0, 0, 0.3);
            outline: none;
        }
        .otp-input-group {
            display: none;
        }
        .hidden { display: none !important; }
        
        /* Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #222;
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            z-index: 9999;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-charcoal text-white selection:bg-orange selection:text-white">
    <!-- Premium Pre-loader -->
    <div id="preloader">
        <div class="loader-bubbles">
            <span style="left:10%; width:40px; height:40px; animation-delay:0s;"></span>
            <span style="left:30%; width:20px; height:20px; animation-delay:2s;"></span>
            <span style="left:50%; width:50px; height:50px; animation-delay:1s;"></span>
            <span style="left:70%; width:30px; height:30px; animation-delay:3s;"></span>
            <span style="left:90%; width:45px; height:45px; animation-delay:1.5s;"></span>
        </div>
        <div class="loader-content">
            <div class="loader-logo">MG</div>
            <div class="loader-bar-wrap">
                <div class="loader-bar"></div>
            </div>
            <p class="text-[10px] uppercase tracking-[4px] text-gray-400 mt-4">Deep Cleaning Services</p>
        </div>
    </div>

    <script>
        // Inline loader logic for login page
        window.addEventListener('load', () => {
            const loader = document.getElementById('preloader');
            if (loader) {
                setTimeout(() => {
                    loader.classList.add('fade-out');
                    setTimeout(() => loader.remove(), 800);
                }, 1500);
            }
        });
    </script>

    <div class="glass-container">
        <div class="glass-card">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-orange-500/10 rounded-2xl flex items-center justify-center text-orange-500 text-3xl mx-auto mb-6">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="font-oswald text-4xl font-bold tracking-tight mb-2 uppercase">Admin <span class="text-[#F07C1A]">Vault</span></h1>
                <p class="text-gray-400 text-sm">Please verify your identity to continue</p>
            </div>

            <!-- Email Form -->
            <div id="email-step">
                <div class="mb-6">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Registered Email</label>
                    <input type="email" id="email" placeholder="admin@example.com" class="input-field w-full rounded-xl px-5 py-4 text-white">
                </div>
                <button onclick="requestOTP()" id="req-btn" class="btn-primary w-full py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                    <span>Send Verification Code</span>
                    <div class="spinner" id="req-spinner"></div>
                </button>
            </div>

            <!-- OTP Form -->
            <div id="otp-step" class="hidden">
                <div class="mb-6">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Verify OTP</label>
                    <input type="text" id="otp" placeholder="Enter 6-digit code" maxlength="6" class="input-field w-full rounded-xl px-5 py-4 text-white text-center text-2xl tracking-[10px] uppercase font-bold">
                    <p class="text-[10px] text-gray-500 mt-2 text-center">We've sent a code to your email. It expires in 5 minutes.</p>
                </div>
                <button onclick="verifyOTP()" id="verify-btn" class="btn-primary w-full py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                    <span>Unlock Dashboard</span>
                    <div class="spinner" id="verify-spinner"></div>
                </button>
                <button onclick="backToEmail()" class="w-full mt-4 text-xs text-gray-500 hover:text-white transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i> Use different email
                </button>
            </div>

            <!-- Footer -->
            <div class="mt-12 text-center border-t border-white/5 pt-8">
                <a href="index.html" class="text-xs text-gray-500 hover:text-orange transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-long-arrow-alt-left"></i> Return to Site
                </a>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="toast"></div>

    <script src="config.js"></script>
    <script>
        const API_BASE = window.API_BASE + '/api/auth';

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.borderColor = isError ? 'rgba(239, 68, 68, 0.4)' : 'rgba(34, 197, 94, 0.4)';
            toast.style.color = isError ? '#ef4444' : '#22c55e';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function requestOTP() {
            const email = document.getElementById('email').value;
            if (!email) return showToast("Please enter your admin email", true);

            const btn = document.getElementById('req-btn');
            const spinner = document.getElementById('req-spinner');
            
            btn.disabled = true;
            spinner.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/request-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast(data.message);
                    document.getElementById('email-step').classList.add('hidden');
                    document.getElementById('otp-step').classList.remove('hidden');
                } else {
                    showToast(data.error || "Request failed", true);
                }
            } catch (err) {
                showToast("Connection error", true);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;
            if (!otp) return showToast("Please enter the verification code", true);

            const btn = document.getElementById('verify-btn');
            const spinner = document.getElementById('verify-spinner');
            
            btn.disabled = true;
            spinner.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp }),
                    credentials: 'include'
                });
                const data = await res.json();

                if (res.ok) {
                    showToast(data.message);
                    // Save token to localStorage for header-based auth fallback
                    if (data.token) localStorage.setItem('admin_token', data.token);
                    
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else {
                    showToast(data.error || "Verification failed", true);
                }
            } catch (err) {
                showToast("Connection error", true);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        function backToEmail() {
            document.getElementById('otp-step').classList.add('hidden');
            document.getElementById('email-step').classList.remove('hidden');
        }

        // Handle enter key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('email-step').classList.contains('hidden')) {
                    requestOTP();
                } else {
                    verifyOTP();
                }
            }
        });
    </script>
</body>
</html>
