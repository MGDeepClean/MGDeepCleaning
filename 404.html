<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | MG Deep Clean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="mg-style.css">
    <style>
        body {
            background: #0a0a0a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(240, 124, 26, 0.5);
        }
    </style>
</head>

<body>
    <!-- Premium Pre-loader -->
    <div id="preloader">
        <div class="loader-bubbles">
            <span style="left:10%; width:40px; height:40px; animation-delay:0s;"></span>
            <span style="left:30%; width:20px; height:20px; animation-delay:2s;"></span>
            <span style="left:50%; width:50px; height:50px; animation-delay:1s;"></span>
            <span style="left:70%; width:30px; height:30px; animation-delay:3s;"></span>
            <span style="left:90%; width:45px; height:45px; animation-delay:1.5s;"></span>
        </div>
        <div class="loader-content">
            <div class="loader-logo">MG</div>
            <div class="loader-bar-wrap">
                <div class="loader-bar"></div>
            </div>
            <p class="text-[10px] uppercase tracking-[4px] text-gray-500 mt-4">Deep Cleaning Services</p>
        </div>
    </div>

    <script>
        // Inline loader logic
        window.addEventListener('load', () => {
            const loader = document.getElementById('preloader');
            if (loader) {
                setTimeout(() => {
                    loader.classList.add('fade-out');
                    setTimeout(() => loader.remove(), 800);
                }, 1500);
            }
        });
    </script>
    <div class="px-6">
        <div class="error-code glow-text">404</div>
        <h1 class="text-3xl font-bold mb-4">Spot Not Found!</h1>
        <p class="text-gray-400 mb-8 max-w-md mx-auto">
            It looks like this page was cleaned away! Even our best cleaners couldn't find what you were looking for.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/home/" class="btn-primary" style="display:inline-block">
                <i class="fas fa-home mr-2"></i> Back to Home
            </a>
            <a href="home/#contact" class="btn-secondary" style="display:inline-block">
                <i class="fas fa-phone-alt mr-2"></i> Contact Us
            </a>
        </div>
    </div>
</body>

</html>
